<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HealerSys | Heat Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <style>
      /* Custom scrollbar for that clean dev look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
      <header
        class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4"
      >
        <div>
          <h1 class="text-3xl font-bold tracking-tight text-white">
            HealerSys
            <span class="text-blue-500 font-light text-2xl">Monitor</span>
          </h1>
          <p class="text-slate-400 text-sm">
            Real-time heat index tracking for Talisay City
          </p>
        </div>
        <div
          id="sync-status"
          class="px-4 py-2 rounded-full bg-slate-900 border border-slate-800 text-xs font-mono text-slate-400"
        >
          📡 Initializing...
        </div>
      </header>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
          <p class="text-slate-500 text-xs uppercase font-bold tracking-wider">
            Latest Location
          </p>
          <p id="top-loc" class="text-xl font-semibold mt-1">--</p>
        </div>
        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
          <p class="text-slate-500 text-xs uppercase font-bold tracking-wider">
            Current Heat
          </p>
          <p id="top-heat" class="text-3xl font-bold mt-1 text-blue-400">--</p>
        </div>
        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
          <p class="text-slate-500 text-xs uppercase font-bold tracking-wider">
            Danger Zone Count
          </p>
          <p id="danger-count" class="text-3xl font-bold mt-1 text-rose-500">
            0
          </p>
        </div>
        <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl">
          <p class="text-slate-500 text-xs uppercase font-bold tracking-wider">
            Last Sync
          </p>
          <p id="top-time" class="text-xl font-semibold mt-1">--</p>
          <p id="top-date" class="text-[10px] text-slate-500 font-mono italic">
            --
          </p>
        </div>
      </div>

      <div
        class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-2xl"
      >
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="bg-slate-800/50 text-slate-400 text-xs uppercase">
                <th class="p-4 font-semibold">Barangay</th>
                <th class="p-4 font-semibold text-center">Heat Index</th>
                <th class="p-4 font-semibold">Coordinates</th>
                <th class="p-4 font-semibold">Timestamp</th>
              </tr>
            </thead>
            <tbody id="tableBody" class="divide-y divide-slate-800"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const { apiKey, apiURL } = HEALERTSYS_CONFIG;

      async function fetchHeatData() {
        const statusIndicator = document.getElementById("sync-status");
        statusIndicator.innerHTML =
          '<span class="animate-pulse text-yellow-500">🔄 Syncing...</span>';

        try {
          const response = await fetch(apiURL, {
            method: "GET",
            headers: {
              "X-API-KEY": apiKey,
              "X-Tunnel-Skip-Anti-Phishing-Page": "true",
              Accept: "application/json",
            },
          });

          if (!response.ok) throw new Error("Connection Error");
          const data = await response.json();

          statusIndicator.innerText = `✅ Connected: ${new Date().toLocaleTimeString()}`;
          renderDashboard(data);
        } catch (err) {
          statusIndicator.innerText = "❌ Sync Failed";
          console.error(err);
        }
      }

      function renderDashboard(data) {
        if (!data || data.length === 0) return;

        // 1. Update Global Stats
        const latest = data[0];
        const dangerTotal = data.filter((item) => item.heatIndex >= 42).length;

        document.getElementById("top-loc").innerText = latest.barangayName;
        document.getElementById("top-heat").innerText = `${latest.heatIndex}°C`;
        document.getElementById("danger-count").innerText = dangerTotal;
        document.getElementById("top-time").innerText = latest.time;
        document.getElementById("top-date").innerText = latest.date;

        // 2. Render Table using your schema fields
        const tableBody = document.getElementById("tableBody");
        let rowsHtml = "";

        data.forEach((item) => {
          const isDanger = item.heatIndex >= 42;
          const isCaution = item.heatIndex >= 39 && item.heatIndex < 42;

          let badgeClass =
            "bg-emerald-500/10 text-emerald-500 border-emerald-500/20";
          if (isDanger)
            badgeClass =
              "bg-rose-500/10 text-rose-500 border-rose-500/20 animate-pulse";
          else if (isCaution)
            badgeClass = "bg-amber-500/10 text-amber-500 border-amber-500/20";

          rowsHtml += `
                    <tr class="hover:bg-slate-800/30 transition-colors">
                        <td class="p-4 font-medium text-slate-200">${item.barangayName}</td>
                        <td class="p-4 text-center">
                            <span class="px-3 py-1 rounded-full border text-sm font-bold ${badgeClass}">
                                ${item.heatIndex}°C
                            </span>
                        </td>
                        <td class="p-4 text-xs font-mono text-slate-500">
                            ${item.lat.toFixed(4)}, ${item.lng.toFixed(4)}
                        </td>
                        <td class="p-4">
                            <div class="text-sm text-slate-300">${item.time}</div>
                            <div class="text-[10px] text-slate-500 font-mono uppercase">${item.date}</div>
                        </td>
                    </tr>
                `;
        });

        tableBody.innerHTML = rowsHtml;
      }

      // Run on load and every 10 seconds
      fetchHeatData();
      setInterval(fetchHeatData, 10000);
    </script>
  </body>
</html>
